name: pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yaml"
  workflow_dispatch: {}

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: build · deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # `enablement: true` flips the repo's Pages source to GitHub Actions
      # on the first run (uses our `pages: write` permission), so a clone
      # of this repo doesn't need a manual Settings → Pages toggle.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Stage assets into site/
        run: cp -r assets site/

      - name: Upload site/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
